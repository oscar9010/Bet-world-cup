<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pollas del Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#050e18;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;padding:24px}
.wrap{max-width:440px;width:100%;text-align:center}
.title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;color:#fff;margin-bottom:4px}
.sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:36px}
.card{display:block;border-radius:16px;padding:24px 28px;margin-bottom:14px;text-decoration:none;transition:transform .15s,opacity .15s}
.card:hover{transform:translateY(-2px);opacity:.9}
.card-rp{background:linear-gradient(135deg,#0d2b16,#1a4a28);border:1px solid rgba(212,160,23,.3)}
.card-fm{background:linear-gradient(135deg,#0d1b2e,#0a2a4a);border:1px solid rgba(14,165,233,.3)}
.card-logo{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;margin-bottom:4px}
.card-rp .card-logo{color:#d4a017}
.card-fm .card-logo{color:#0ea5e9}
.card-desc{font-size:12px;color:rgba(255,255,255,.5);font-weight:700;letter-spacing:1px}
.badge{display:inline-block;font-size:9px;letter-spacing:2px;padding:2px 10px;border-radius:20px;margin-bottom:8px;font-weight:700}
.badge-rp{background:rgba(212,160,23,.15);color:#d4a017;border:1px solid rgba(212,160,23,.3)}
.badge-fm{background:rgba(14,165,233,.15);color:#0ea5e9;border:1px solid rgba(14,165,233,.3)}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">POLLAS 2026</div>
  <div class="sub">Selecciona tu grupo</div>
  <a class="card card-rp" href="rancho-paisa/">
    <div class="badge badge-rp">MUNDIAL 2026</div>
    <div class="card-logo">RANCHO PAISA</div>
    <div class="card-desc">Pollas del Mundial</div>
  </a>
  <a class="card card-fm" href="farmamodelo/">
    <div class="badge badge-fm">MUNDIAL 2026</div>
    <div class="card-logo">FARMAMODELO</div>
    <div class="card-desc">Polla del Mundial</div>
  </a>
</div>
</body>
</html>
